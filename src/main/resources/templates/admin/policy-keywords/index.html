<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Policy Keywords</title>

    <link rel="stylesheet"
          th:href="@{/css/app.css}"/>

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="content">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        <h1>Manage Policy Keywords</h1>

        <div class="card">

            <form class="admin-form"
                  method="post"
                  th:action="@{/admin/policy-keywords/add}"
                  th:object="${keyword}">

                <input th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"
                       type="hidden"/>

                <div class="form-group">

                    <label for="text">Keyword</label>

                    <input id="text"
                           placeholder="Enter policy keyword"
                           th:field="*{text}"
                           type="text"/>

                    <div class="validation-message error"
                         th:errors="*{text}"
                         th:if="${#fields.hasErrors('text')}">
                    </div>

                </div>

                <button class="primary-btn"
                        type="submit">
                    Add Keyword
                </button>

            </form>

        </div>

        <div class="admin-list">

            <p class="admin-empty"
               th:if="${#lists.isEmpty(keywords)}">
                No policy keywords have been configured.
            </p>

            <div class="admin-row"
                 th:each="keyword : ${keywords}">

                <div class="admin-name"
                     th:text="${keyword.text}">
                    Keyword
                </div>

                <div class="admin-actions">

                    <a class="secondary-btn"
                       th:href="@{/admin/policy-keywords/{id}/edit(id=${keyword.id})}">
                        Edit
                    </a>

                    <form method="post"
                          onsubmit="return confirm('Delete this keyword? This may unflag prompts using only this keyword.');"
                          th:action="@{/admin/policy-keywords/{id}/delete(id=${keyword.id})}">

                        <input th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"
                               type="hidden"/>

                        <button class="danger-btn"
                                type="submit">
                            Delete
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
