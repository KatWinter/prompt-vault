<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Policy Keywords</title>

    <link rel="stylesheet"
          th:href="@{/css/app.css}"/>

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="content">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        <div class="page-header">

            <h1>Policy Keywords</h1>

            <a class="primary-btn"
               th:href="@{/admin/policy-keywords/add}">
                Add Keyword
            </a>

        </div>

        <div class="policy-keyword-list">

            <p class="policy-keyword-empty"
               th:if="${#lists.isEmpty(keywords)}">
                No policy keywords have been configured.
            </p>

            <div class="policy-keyword-row"
                 th:each="keyword : ${keywords}">

                <div class="policy-keyword-text"
                     th:text="${keyword.text}">
                    Keyword
                </div>

                <div class="policy-keyword-actions">

                    <a class="secondary-btn"
                       th:href="@{/admin/policy-keywords/{id}/edit(id=${keyword.id})}">
                        Edit
                    </a>

                    <form method="post"
                          onsubmit="return confirm('Delete this keyword?');"
                          th:action="@{/admin/policy-keywords/{id}/delete(id=${keyword.id})}">

                        <input th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"
                               type="hidden"/>

                        <button class="danger-btn"
                                type="submit">
                            Delete
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
