<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Edit Prompt Category</title>

    <link rel="stylesheet"
          th:href="@{/css/app.css}" />

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="content">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        <h1>Edit Prompt Category</h1>

        <div class="card">

            <form th:action="@{/admin/categories/{id}/edit(id=${categoryId})}"
                  method="post"
                  th:object="${category}">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <div class="form-group">

                    <label for="name">Category Name</label>

                    <input id="name"
                           type="text"
                           th:field="*{name}" />

                    <div class="validation-message error"
                         th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}">
                    </div>

                </div>
                <div class="form-actions">

                    <button type="submit"
                            class="primary-btn">
                        Save Changes
                    </button>

                    <a class="secondary-btn"
                       th:href="@{/admin/categories}">
                        Cancel
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>

</html>
