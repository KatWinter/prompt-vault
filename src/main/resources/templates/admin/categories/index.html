<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Manage Prompt Categories</title>

    <link rel="stylesheet"
          th:href="@{/css/app.css}" />

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="content">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        <h1>Manage Prompt Categories</h1>

        <div class="card">

            <form class="category-form"
                  th:action="@{/admin/categories}"
                  method="post"
                  th:object="${newCategory}">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <div class="form-group">

                    <label for="name">Category Name</label>

                    <input id="name"
                           type="text"
                           th:field="*{name}"
                           placeholder="Enter category name" />

                    <div class="validation-message error"
                         th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}">
                    </div>

                </div>

                <button type="submit"
                        class="primary-btn">
                    Add Category
                </button>

            </form>

        </div>

        <div class="category-list">

            <div class="category-row"
                 th:each="category : ${categories}">

                <div class="category-name"
                     th:text="${category.name}">
                </div>

                <div class="category-actions">

                    <a class="secondary-btn"
                       th:href="@{/admin/categories/{id}/edit(id=${category.id})}">
                        Edit
                    </a>

                    <form th:action="@{/admin/categories/{id}/delete(id=${category.id})}"
                          method="post">

                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}" />

                        <button type="submit"
                                class="danger-btn">
                            Delete
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
