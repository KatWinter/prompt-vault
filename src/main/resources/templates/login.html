<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Prompt Vault - Login</title>

    <link rel="stylesheet"
          th:href="@{/css/app.css}">
</head>

<body class="login-body">

<div class="login-container">

    <div class="login-card">

        <h1 class="login-title">
            Prompt Vault
        </h1>

        <p class="login-subtitle">
            Store and manage your AI prompts
        </p>

        <div class="alert error"
             th:if="${param.error}">
            Invalid username or password.
        </div>

        <div class="alert success"
             th:if="${param.logout}">
            You have been logged out.
        </div>

        <div class="alert success"
             th:if="${param.registered}">
            Registration successful. Please log in.
        </div>

        <form th:action="@{/req/login}"
              method="post">

            <div class="form-group">

                <label for="username">
                    Username
                </label>

                <input id="username"
                       type="text"
                       name="username"
                       required>

            </div>

            <div class="form-group">

                <label for="password">
                    Password
                </label>

                <input id="password"
                       type="password"
                       name="password"
                       required>

            </div>

            <button type="submit"
                    class="primary-btn">
                Sign In
            </button>

        </form>

        <div class="register-link">

            <a th:href="@{/req/register}">
                No account? Register now
            </a>

        </div>

    </div>

</div>

</body>
</html>
