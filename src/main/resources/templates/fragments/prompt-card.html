<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="promptCard(prompt, isSharedView)"
     class="prompt-card">

    <div class="prompt-card-header">

        <h3 th:text="${prompt.title}">
            Prompt Title
        </h3>

        <span class="prompt-visibility"
              th:text="${prompt.visibility}">
            PRIVATE
        </span>

    </div>

    <div class="prompt-meta">

    <span th:text="${prompt.categoryName}">
        Category
    </span>

    </div>

    <p class="prompt-text"
       th:text="${prompt.promptText}">
    </p>

    <div class="prompt-flags"
         th:if="${prompt.flaggedKeywords != null and !prompt.flaggedKeywords.isBlank()}">

        <strong>Flagged:</strong>

        <span th:text="${prompt.flaggedKeywords}">
    </span>

    </div>

    <div class="prompt-actions">

        <form method="post"
              th:action="@{/prompts/send/{id}(id=${prompt.id})}">

            <input name="returnTo"
                   th:value="${isSharedView == true ? 'shared' : 'mine'}"
                   type="hidden"/>

            <button class="primary-btn"
                    type="submit">
                Send
            </button>

        </form>

        <th:block th:if="${!isSharedView}">

            <a class="secondary-btn"
               th:href="@{/prompts/edit/{id}(id=${prompt.id})}">
                Edit
            </a>

            <form method="post"
                  onsubmit="return confirm('Delete this prompt?');"
                  th:action="@{/prompts/delete/{id}(id=${prompt.id})}">

                <button class="danger-btn"
                        type="submit">
                    Delete
                </button>

            </form>

        </th:block>

    </div>
</div>

</body>
</html>
