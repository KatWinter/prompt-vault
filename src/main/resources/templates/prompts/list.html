<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Prompts</title>

    <link rel="stylesheet"
          th:href="@{/css/app.css}"/>
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="content">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        <div class="page-header">
            <h1 th:text="${isSharedView ? 'Shared Prompts' : 'My Prompts'}">
                My Prompts
            </h1>

        </div>

        <div class="alert success"
             th:if="${message}"
             th:text="${message}">
        </div>

        <p class="admin-empty"
           th:if="${#lists.isEmpty(prompts)}">
            You have not created any prompts yet.
        </p>

        <div class="prompt-grid"
             th:if="${!#lists.isEmpty(prompts)}">

            <div th:each="prompt : ${prompts}">
                <div th:replace="~{fragments/prompt-card :: promptCard(${prompt}, ${isSharedView})}">
                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
