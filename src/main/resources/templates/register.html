<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Prompt Vault - Register</title>

    <link rel="stylesheet"
          th:href="@{/css/app.css}">
</head>

<body class="login-body">

<div class="login-container">

    <div class="login-card">

        <h1 class="login-title">
            Prompt Vault
        </h1>

        <h2 class="section-title">
            Create Account
        </h2>

        <p class="login-subtitle">
            Join Prompt Vault and start organizing your prompts.
        </p>

        <div class="alert error"
             th:if="${param.error}">

            <span th:text="${param.error}">
                Registration Error
            </span>

        </div>

        <form th:action="@{/req/register}"
              method="post">

            <div class="form-group">

                <label for="username">
                    Username
                </label>

                <input id="username"
                       type="text"
                       name="username"
                       required>

            </div>

            <div class="form-group">

                <label for="email">
                    Email
                </label>

                <input id="email"
                       type="email"
                       name="email"
                       required>

            </div>

            <div class="form-row">

                <div class="form-group">

                    <label for="firstName">
                        First Name
                    </label>

                    <input id="firstName"
                           type="text"
                           name="firstName"
                           required>

                </div>

                <div class="form-group">

                    <label for="lastName">
                        Last Name
                    </label>

                    <input id="lastName"
                           type="text"
                           name="lastName"
                           required>

                </div>

            </div>

            <div class="form-group">

                <label for="password">
                    Password
                </label>

                <input id="password"
                       type="password"
                       name="password"
                       required>

            </div>

            <div class="form-group">

                <label for="passwordConfirmation">
                    Confirm Password
                </label>

                <input id="passwordConfirmation"
                       type="password"
                       name="passwordConfirmation"
                       required>

            </div>

            <div id="passwordMatchMessage"
                 class="validation-message">
            </div>

            <button type="submit"
                    id="registerButton"
                    class="primary-btn"
                    disabled>

                Create Account

            </button>

        </form>

        <div class="register-link">

            <a th:href="@{/req/login}">
                Already have an account? Sign In
            </a>

        </div>

    </div>

</div>

<script>

    const username = document.getElementById('username');
    const email = document.getElementById('email');
    const firstName = document.getElementById('firstName');
    const lastName = document.getElementById('lastName');
    const password = document.getElementById('password');
    const passwordConfirmation =
        document.getElementById('passwordConfirmation');

    const registerButton =
        document.getElementById('registerButton');

    const passwordMessage =
        document.getElementById('passwordMatchMessage');

    function validateForm() {

        const allFieldsFilled =
            username.value.trim() !== '' &&
            email.value.trim() !== '' &&
            firstName.value.trim() !== '' &&
            lastName.value.trim() !== '' &&
            password.value !== '' &&
            passwordConfirmation.value !== '';

        const passwordsMatch =
            password.value === passwordConfirmation.value;

        if (
            passwordConfirmation.value.length > 0 &&
            !passwordsMatch
        ) {

            passwordMessage.textContent =
                'Passwords do not match';

            passwordMessage.className =
                'validation-message error';

        } else {

            passwordMessage.textContent = '';

            passwordMessage.className =
                'validation-message';

        }

        registerButton.disabled =
            !(allFieldsFilled && passwordsMatch);
    }

    [
        username,
        email,
        firstName,
        lastName,
        password,
        passwordConfirmation
    ].forEach(field => {

        field.addEventListener(
            'input',
            validateForm
        );

    });

</script>

</body>
</html>
